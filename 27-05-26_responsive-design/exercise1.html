<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>responsive box</title>
    <style>
      body {
        display: flex;
        height: 100vh;
        margin: 0;
        justify-content: center;
      }
      .box {
        background-color: red;
        width: 100%;
      }
      @media (min-width: 768px) {
        .box {
          background-color: blue;
          width: 300px;
        }
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
  </body>
</html>
