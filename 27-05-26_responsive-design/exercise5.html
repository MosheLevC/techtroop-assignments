<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Product Layout</title>
    <style>
      h1,
      h2,
      p {
        margin: 0;
      }
      h1 {
        font-weight: bold;
        font-size: 16px;
        color: #3f4e5f;
      }
      h2 {
        font-weight: bold;
        font-size: 16px;
      }
      p {
        color: #707070;
        font-size: 12px;
      }
      a {
        font-weight: bold;
        font-size: 10px;
      }
      body {
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #697fe9 0%, #764da5 100%);
      }
      .product {
        overflow: hidden;
        margin: 40px;
        height: 400px;
        border-radius: 5px;
        display: flex;
        flex-direction: column;
        background-color: white;
      }
      .image-placeholder {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 50%;
        background: linear-gradient(135deg, #697fe9 0%, #764da5 100%);
      }
      .camera-circle {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 50px;
        width: 50px;
        border-radius: 50%;
        background-color: #8a83d0;
      }
      .product-details {
        height: 50%;
        display: flex;
        justify-content: space-between;
        flex-direction: column;
        text-align: center;
        padding: 20px;
      }
      .purchase-section {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
      }
      .purchase-section > h2 {
        color: #e74b3c;
      }
      .purchase-section > a {
        align-content: center;
        height: 30px;
        width: 90%;
        margin: 10px;
        border-radius: 5px;
        text-decoration: none;
        color: white;
        background: linear-gradient(135deg, #697fe9 0%, #764da5 100%);
      }
      @media (min-width: 600px) {
        h1 {
          font-size: 20px;
        }
        h2 {
          font-size: 18px;
        }
        p {
          font-size: 15px;
        }
        a {
          font-size: 13px;
        }
        .product {
          height: 350px;
        }
        .product-details {
          text-align: left;
        }
        .purchase-section {
          flex-direction: row;
        }
        .purchase-section > a {
          width: 25%;
          text-align: center;
        }
      }
      @media (min-width: 900px) {
        h1 {
          font-size: 26px;
        }
        h2 {
          font-weight: bold;
          font-size: 24px;
        }
        p {
          font-size: 18px;
        }
        a {
          font-weight: bold;
          font-size: 16px;
        }
        .product {
          height: 300px;
          flex-direction: row;
        }
        .image-placeholder {
          height: auto;
          width: 40%;
        }
        .product-details {
          height: auto;
          width: 60%;
          padding: 30px;
        }
        .purchase-section > a {
          width: 30%;
          height: 40px;
        }
      }
    </style>
  </head>
  <body>
    <section class="product">
      <div class="image-placeholder">
        <div class="camera-circle">📷</div>
      </div>
      <section class="product-details">
        <h1>Premium Laptop</h1>
        <p>
          Lorem ipsum dolor, sit amet consectetur adipisicing elit. Itaque nostrum, rerum soluta minima delectus fugit eaque provident ex suscipit
          placeat. Cumque labore qui saepe distinctio ullam cum esse explicabo? Minus.
        </p>
        <section class="purchase-section">
          <h2>$1,299</h2>
          <a href="#">Add to Cart</a>
        </section>
      </section>
    </section>
  </body>
</html>
