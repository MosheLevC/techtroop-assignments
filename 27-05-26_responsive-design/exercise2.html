<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>responsive text</title>
    <style>
      body {
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #697fe9 0%, #764da5 100%);
      }
      section {
        width: 250px;
        height: fit-content;
        padding: 20px;
        margin: 20px;
        background-color: #f5f5f5;
        border-radius: 10px;
        box-shadow: 0 0 4px 0;
      }
      h1 {
        font-size: 24px;
        text-decoration: underline;
      }
      p {
        font-size: 14px;
      }
      @media (min-width: 600px) {
        section {
          width: 400px;
        }
        h1 {
          font-size: 36px;
        }
        p {
          font-size: 16px;
        }
      }
      @media (min-width: 900px) {
        section {
          width: 700px;
        }
        h1 {
          font-size: 48px;
        }
        p {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <section>
      <h1>This is a heading</h1>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Earum, unde eligendi molestias facilis quo velit exercitationem dolores repudiandae
        dolorum suscipit deserunt alias fugit ad veniam sapiente sed tempore, repellat ipsa?
      </p>
    </section>
  </body>
</html>
