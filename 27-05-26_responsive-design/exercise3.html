    <title>Responsive Image Gallery</title>
    <style>
      body {
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        flex-wrap: wrap;
        background: linear-gradient(225deg, #e4e9f2 0%, #9dc3ea 100%);
      }
      .row {
        height: 33vh;
        width: 100%;
        display: flex;
        gap: 10px;
        padding: 20px;
        flex-wrap: wrap;
      }
      .column {
        position: relative;
        width: 100%;
        overflow: hidden;
        background-color: cadetblue;
        border-radius: 5px;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .image-text {
        margin: 0;
        position: absolute;
        bottom: 0;
        left: 0;
        margin: 5px;
        font-size: 14px;
        color: #d3d3d3cc;
        -webkit-text-stroke: 1px #585858cc;
      }
      @media (min-width: 600px) {
        .column {
          width: calc((100% - 10px) / 2);
        }
        .image-text {
          font-size: 16px;
        }
      }
      @media (min-width: 900px) {
        .column {
          width: calc((100% - 20px) / 3);
        }
        .image-text {
          font-size: 18px;
        }
      }
    </style>
  </head>
