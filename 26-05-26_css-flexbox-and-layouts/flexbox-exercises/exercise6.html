<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circle, text and lines</title>
    <style>
      .flexbox {
        display: flex;
        flex-direction: column;
        justify-self: center;
        width: 450px;
        height: 450px;
        border: 3px solid #f08080;
      }
      .row {
        display: flex;
        justify-content: space-evenly;
        flex: 2;
      }
      .circle {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background-color: #f08080;
        align-self: flex-end;
      }
      .paragraph {
        width: 80%;
        color: #211f74;
      }
      .lines-container {
        flex: 1;
        border-top: 3px solid #f08080;
        align-items: center;
        gap: 10px;
        padding: 0px 20px;
      }
      .lines-container > div {
        background-color: #f08080;
        height: 10px;
        width: 50px;
      }
      .lines-container > div:first-child {
        margin-right: auto;
      }
    </style>
  </head>
  <body class="flexbox">
    <div class="row">
      <div class="circle"></div>
    </div>
    <div class="row">
      <p class="paragraph">
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Illo, quod laudantium? Et animi nihil doloribus architecto totam quae, dolores
        pariatur enim earum maiores reiciendis iste vel praesentium molestiae obcaecati ab!
      </p>
    </div>
    <div class="row lines-container">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </body>
</html>
