<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exercise 4</title>
    <style>
      body {
        margin: 0;
      }
      .red {
        margin: 80px auto;
        position: relative;
        width: 350px;
        height: 300px;
        background-color: #d63031;
        border-bottom-right-radius: 25px;
        border-bottom-left-radius: 25px;
      }
      .white {
        background-color: white;
        left: 20%;
        right: 20%;
        height: 80%;
        border-bottom-right-radius: 25px;
        border-bottom-left-radius: 25px;
      }
      .child {
        position: absolute;
        top: 0;
      }
      .gray {
        background-color: gray;
        width: 20%;
        height: 20%;
        top: -2%;
        border-top-right-radius: 5px;
        border-top-left-radius: 5px;
      }
      .top-right {
        right: 0;
      }
      .top-left {
        left: 0;
      }
    </style>
  </head>
  <body>
    <div class="red">
      <div class="child gray top-right"></div>
      <div class="child gray top-left"></div>
      <div class="white child"></div>
    </div>
  </body>
</html>
