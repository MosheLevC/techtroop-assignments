<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exercise 3</title>
    <style>
      body {
        margin: 0;
      }
      .graph {
        margin: 100px auto;
        position: relative;
        width: 60%;
        height: 300px;
        background-color: #6c5ce7;
        border-radius: 5px;
      }
      .bar {
        width: 5%;
        bottom: 10px;
        background-color: #b2bec3;
        position: absolute;
      }
      p {
        position: absolute;
        margin: 3px;
        font-family: Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-weight: bold;
      }
      .time {
        bottom: 0;
        right: 0;
      }
      .money {
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div class="graph">
      <p class="time">Time</p>
      <p class="money">Money</p>
      <div class="bar" style="height: 50px; left: 5%"></div>
      <div class="bar" style="height: 170px; left: 17%"></div>
      <div class="bar" style="height: 220px; left: 29%"></div>
      <div class="bar" style="height: 200px; left: 41%"></div>
      <div class="bar" style="height: 180px; left: 53%"></div>
      <div class="bar" style="height: 120px; left: 65%"></div>
    </div>
  </body>
</html>
