<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exercise 1</title>
    <style>
      div {
        margin: 50px auto;
        position: relative;
        width: 60%;
      }
      img {
        width: 100%;
      }
      p {
        position: absolute;
        margin: 3px;
      }
      .top-right {
        right: 0;
        top: 0;
      }
      .bottom-left {
        left: 0;
        bottom: 0;
      }
      .bottom-right {
        bottom: 0;
        right: 0;
      }
      .top-left {
        top: 0;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div>
      <img src="https://wallpapercat.com/w/full/5/3/1/157412-1920x1080-desktop-full-hd-shrek-background-image.jpg" alt="shrek" />
      <p class="bottom-left">bottom-left</p>
      <p class="bottom-right">bottom-right</p>
      <p class="top-left">top-left</p>
      <p class="top-right">top-right</p>
    </div>
  </body>
</html>
