<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>exercise 1</title>
    <style>
      body {
        margin: 0;
      }
      .blue {
        height: 100%;
        width: 100%;
        background-color: blue;
        position: absolute;
      }
      .red1 {
        background-color: red;
        height: 100%;
        width: 25px;
        left: 5%;
        position: absolute;
      }
      .red2 {
        width: 100%;
        height: 25px;
        top: 15%;
        background-color: red;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div class="blue">
      <div class="red1"></div>
      <div class="red2"></div>
    </div>
  </body>
</html>
