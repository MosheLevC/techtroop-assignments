<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Israeli premier league</title>
    <style>
      table {
        border-spacing: 0;
      }
      tr.bottom td {
        border-bottom: thin solid gray;
      }
      td:first-child,
      th:first-child {
        border-left: thin solid gray;
      }
      td:last-child,
      th:last-child {
        border-right: thin solid gray;
      }
      td,
      th {
        padding: 8px;
        border-top: thin solid gray;
      }
      th {
        background-color: #e9ecf0;
      }
      td {
        background-color: #baf4bb;
      }
      .bold {
        font-weight: bolder;
      }
    </style>
  </head>
  <body>
    <div>
      <table>
        <tr>
          <th>Pos</th>
          <th>Team</th>
          <th>Pld</th>
          <th>W</th>
          <th>D</th>
          <th>L</th>
          <th>GD</th>
          <th>Pts</th>
        </tr>
        <tr>
          <td>1</td>
          <td class="bold">Hapoel Beer Sheva</td>
          <td>26</td>
          <td>18</td>
          <td>5</td>
          <td>3</td>
          <td>+33</td>
          <td class="bold">59</td>
        </tr>
        <tr>
          <td>2</td>
          <td class="bold">Beitar Jerusalem</td>
          <td>26</td>
          <td>17</td>
          <td>6</td>
          <td>3</td>
          <td>+32</td>
          <td class="bold">57</td>
        </tr>
        <tr>
          <td>3</td>
          <td class="bold">Maccabi Tel Aviv</td>
          <td>26</td>
          <td>14</td>
          <td>7</td>
          <td>5</td>
          <td>+23</td>
          <td class="bold">49</td>
        </tr>
        <tr>
          <td>4</td>
          <td class="bold">Hapoel Tel Aviv</td>
          <td>26</td>
          <td>15</td>
          <td>6</td>
          <td>5</td>
          <td>+20</td>
          <td class="bold">49</td>
        </tr>
        <tr>
          <td>5</td>
          <td class="bold">Maccabi Haifa</td>
          <td>26</td>
          <td>11</td>
          <td>9</td>
          <td>6</td>
          <td>+22</td>
          <td class="bold">42</td>
        </tr>
        <tr class="bottom">
          <td>6</td>
          <td class="bold">Hapoel Petah Tikva</td>
          <td>26</td>
          <td>9</td>
          <td>10</td>
          <td>7</td>
          <td>+5</td>
          <td class="bold">37</td>
        </tr>
      </table>
    </div>
  </body>
</html>
